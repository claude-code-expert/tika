<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Ticket body -->
  <rect x="1" y="5" width="30" height="22" rx="5" ry="5" fill="#629584"/>
  <!-- Dashed perforation line -->
  <line x1="9" y1="8" x2="9" y2="24" stroke="white" stroke-width="1.5" stroke-dasharray="2.5 2.5" stroke-linecap="round"/>
  <!-- Left notch -->
  <circle cx="1" cy="16" r="3.5" fill="white"/>
  <!-- Right notch -->
  <circle cx="31" cy="16" r="3.5" fill="white"/>
  <!-- Checkmark -->
  <polyline points="14,16.5 17.5,20 23,13" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
