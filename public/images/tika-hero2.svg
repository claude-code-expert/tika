<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F0F7F4"/>
      <stop offset="55%"  stop-color="#F8F9FB"/>
      <stop offset="100%" stop-color="#EAF0F6"/>
    </linearGradient>

    <!-- Accent gradient for headline -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#629584"/>
      <stop offset="100%" stop-color="#4A7A69"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#091E42" flood-opacity="0.10"/>
    </filter>

    <!-- Board shadow -->
    <filter id="boardShadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#091E42" flood-opacity="0.12"/>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#C8D6E0" opacity="0.5"/>
    </pattern>

    <!-- Clip for board -->
    <clipPath id="boardClip">
      <rect x="0" y="0" width="580" height="420" rx="16"/>
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap');
      .font-display { font-family: 'Plus Jakarta Sans', sans-serif; }
      .font-body    { font-family: 'Noto Sans KR', 'Plus Jakarta Sans', sans-serif; }
    </style>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.6"/>

  <!-- Background decorative circles -->
  <circle cx="80"  cy="80"  r="180" fill="#629584" opacity="0.04"/>
  <circle cx="1150" cy="580" r="220" fill="#3B82F6" opacity="0.04"/>
  <circle cx="620" cy="320" r="300" fill="#629584" opacity="0.025"/>

  <!-- ─── LEFT SIDE — Copy ─── -->

  <!-- Logo badge -->
  <rect x="60" y="64" width="44" height="44" rx="10" fill="#629584"/>
  <text x="82" y="92" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="22" fill="white">T</text>
  <text x="116" y="92" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="22" fill="#2C3E50">Tika</text>

  <!-- Eyebrow label -->
  <rect x="60" y="138" width="192" height="26" rx="13" fill="#E8F5F0"/>
  <circle cx="78" cy="151" r="5" fill="#629584"/>
  <text x="90" y="156" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="12" fill="#629584" letter-spacing="0.5">Ticket-based Kanban Board</text>

  <!-- Main headline line 1 -->
  <text x="60" y="234" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="58" fill="#2C3E50" letter-spacing="-1.5">Plan</text>
  <text x="172" y="234" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="58" fill="url(#accentGrad)" letter-spacing="-1.5"> Simply.</text>

  <!-- Main headline line 2 -->
  <text x="60" y="305" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="58" fill="#2C3E50" letter-spacing="-1.5">Ship</text>
  <text x="184" y="305" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="58" fill="url(#accentGrad)" letter-spacing="-1.5"> Boldly.</text>

  <!-- Subscription text -->
  <text x="60" y="366" font-family="'Noto Sans KR', 'Plus Jakarta Sans', sans-serif" font-weight="400" font-size="16" fill="#5A6B7F">Ticket-based Kanban Board for Goal-driven Task Management</text>

  <!-- Divider line under copy -->
  <rect x="60" y="332" width="48" height="3" rx="2" fill="#629584"/>

  <!-- CTA Buttons -->
  <rect x="60" y="408" width="192" height="46" rx="8" fill="#629584"/>
  <g transform="translate(78, 423)">
    <path d="M15.55 8.2c0-.52-.05-1.02-.13-1.5H8v2.84h4.24c-.18.92-.74 1.7-1.57 2.22v1.84h2.54c1.49-1.37 2.34-3.39 2.34-5.4z" fill="white"/>
    <path d="M8 15c2.16 0 3.97-.72 5.29-1.94l-2.54-1.84c-.72.48-1.64.77-2.75.77-2.1 0-3.89-1.42-4.52-3.33H.86v1.9C2.17 13.86 4.87 15 8 15z" fill="white"/>
    <path d="M3.48 9.66c-.16-.48-.25-1-.25-1.53s.09-1.05.25-1.53V4.7H.86C.29 5.82 0 7.08 0 8.4s.29 2.58.86 3.7l2.62-2.44z" fill="white"/>
    <path d="M8 3.07c1.18 0 2.24.41 3.08 1.2l2.3-2.3C12 .8 10.16 0 8 0 4.87 0 2.17 1.64.86 4.1l2.62 1.9C4.11 4.49 5.9 3.07 8 3.07z" fill="white"/>
  </g>
  <text x="170" y="436" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="14" fill="white">Google로 시작하기</text>

  <rect x="266" y="408" width="134" height="46" rx="8" fill="none" stroke="#629584" stroke-width="1.5"/>
  <text x="333" y="436" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="14" fill="#629584">데모 보기</text>

  <!-- Trust indicators (rendered as HTML overlay) -->

  <!-- ─── RIGHT SIDE — Kanban Board Mockup ─── -->
  <g transform="translate(568, 70)" filter="url(#boardShadow)">

    <!-- Board container -->
    <rect width="580" height="490" rx="16" fill="#FFFFFF" clip-path="url(#boardClip)"/>

    <!-- Board header bar -->
    <rect width="580" height="52" rx="0" fill="#F8F9FB"/>
    <rect width="580" height="1"  y="52" fill="#DFE1E6"/>

    <!-- Window dots -->
    <circle cx="22" cy="26" r="6" fill="#FC5F57"/>
    <circle cx="42" cy="26" r="6" fill="#FDBC2C"/>
    <circle cx="62" cy="26" r="6" fill="#2BC840"/>

    <!-- Board title in header -->
    <rect x="88" y="16" width="22" height="22" rx="5" fill="#629584"/>
    <text x="99" y="30" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="11" fill="white">T</text>
    <text x="118" y="30" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="13" fill="#2C3E50">Tika</text>
    <text x="160" y="30" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" fill="#8993A4">/ MVP 출시</text>

    <!-- "+ 새 업무" button -->
    <rect x="480" y="13" width="80" height="28" rx="6" fill="#629584"/>
    <text x="520" y="31" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-weight="600" font-size="11" fill="white">+ 새 업무</text>

    <!-- Board columns area -->
    <rect y="52" width="580" height="438" fill="#E8EDF2"/>

    <!-- ─ Column 1: Backlog ─ -->
    <g transform="translate(10, 62)">
      <rect width="128" height="420" rx="10" fill="#F4F5F7"/>
      <!-- Header -->
      <rect width="128" height="40" rx="10" fill="#F4F5F7"/>
      <rect y="30" width="128" height="10" fill="#F4F5F7"/>
      <text x="14" y="25" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="13" fill="#2C3E50">Backlog</text>
      <rect x="90" y="13" width="26" height="16" rx="8" fill="rgba(0,0,0,0.08)"/>
      <text x="103" y="25" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="10" fill="#2C3E50">4</text>

      <!-- Card 1 -->
      <g transform="translate(8, 48)" filter="url(#cardShadow)">
        <rect width="112" height="76" rx="6" fill="white"/>
        <rect x="8" y="10" width="36" height="14" rx="3" fill="#EDE9FE"/>
        <text x="26" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#7C3AED">GOAL</text>
        <text x="8" y="44" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#2C3E50">MVP 출시 계획</text>
        <rect x="8" y="54" width="30" height="14" rx="3" fill="#FEF9C3"/>
        <text x="23" y="65" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#A16207">중간</text>
        <circle cx="96" cy="61" r="10" fill="#7EB4A2"/>
        <text x="96" y="65" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="8" font-weight="600" fill="white">홍</text>
      </g>

      <!-- Card 2 -->
      <g transform="translate(8, 132)" filter="url(#cardShadow)">
        <rect width="112" height="68" rx="6" fill="white"/>
        <rect x="8" y="10" width="44" height="14" rx="3" fill="#DBEAFE"/>
        <text x="30" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#1E40AF">STORY</text>
        <text x="8" y="44" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#2C3E50">인증 시스템</text>
        <rect x="8" y="52" width="38" height="14" rx="3" fill="#FFEDD5"/>
        <text x="27" y="63" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#C2410C">높음</text>
      </g>
    </g>

    <!-- ─ Column 2: TODO ─ -->
    <g transform="translate(148, 62)">
      <rect width="128" height="420" rx="10" fill="#F4F5F7"/>
      <rect width="128" height="40" rx="10" fill="#DBEAFE"/>
      <rect y="30" width="128" height="10" fill="#F4F5F7"/>
      <text x="14" y="25" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="13" fill="#2C3E50">TODO</text>
      <rect x="92" y="13" width="26" height="16" rx="8" fill="rgba(0,0,0,0.08)"/>
      <text x="105" y="25" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="10" fill="#2C3E50">3</text>

      <!-- Card 1 -->
      <g transform="translate(8, 48)" filter="url(#cardShadow)">
        <rect width="112" height="82" rx="6" fill="white"/>
        <rect x="8" y="10" width="50" height="14" rx="3" fill="#D1FAE5"/>
        <text x="33" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#065F46">FEATURE</text>
        <text x="8" y="40" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#2C3E50">드래그앤드롭</text>
        <text x="8" y="55" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#8993A4">dnd-kit 구현</text>
        <rect x="8" y="62" width="38" height="14" rx="3" fill="#FEE2E2"/>
        <text x="27" y="73" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#DC2626">긴급</text>
        <circle cx="96" cy="69" r="10" fill="#60A5FA"/>
        <text x="96" y="73" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="8" font-weight="600" fill="white">김</text>
      </g>

      <!-- Card 2 -->
      <g transform="translate(8, 138)" filter="url(#cardShadow)">
        <rect width="112" height="74" rx="6" fill="white"/>
        <rect x="8" y="10" width="36" height="14" rx="3" fill="#FEF3C7"/>
        <text x="26" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#92400E">TASK</text>
        <text x="8" y="42" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#2C3E50">API 엔드포인트</text>
        <!-- checklist progress -->
        <text x="8" y="58" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="#8993A4">✓ 3/5</text>
        <rect x="8" y="62" width="60" height="4" rx="2" fill="#F4F5F7"/>
        <rect x="8" y="62" width="36" height="4" rx="2" fill="#629584"/>
      </g>
    </g>

    <!-- ─ Column 3: In Progress ─ -->
    <g transform="translate(286, 62)">
      <rect width="128" height="420" rx="10" fill="#F4F5F7"/>
      <rect width="128" height="40" rx="10" fill="#FEF3C7"/>
      <rect y="30" width="128" height="10" fill="#F4F5F7"/>
      <text x="14" y="25" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="12" fill="#2C3E50">In Progress</text>
      <rect x="95" y="13" width="24" height="16" rx="8" fill="rgba(0,0,0,0.08)"/>
      <text x="107" y="25" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="10" fill="#2C3E50">2</text>

      <!-- Card 1 — highlighted/active -->
      <g transform="translate(8, 48)" filter="url(#cardShadow)">
        <rect width="112" height="90" rx="6" fill="white" stroke="#629584" stroke-width="1.5"/>
        <rect x="8" y="10" width="50" height="14" rx="3" fill="#D1FAE5"/>
        <text x="33" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#065F46">FEATURE</text>
        <text x="8" y="40" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#2C3E50">칸반 보드 UI</text>
        <text x="8" y="55" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#8993A4">4칼럼 레이아웃</text>
        <!-- Label tags -->
        <rect x="8" y="62" width="32" height="14" rx="3" fill="#2b7fff"/>
        <text x="24" y="73" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="white">FE</text>
        <rect x="44" y="62" width="40" height="14" rx="3" fill="#ad46ff"/>
        <text x="64" y="73" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="white">Design</text>
        <circle cx="96" cy="79" r="10" fill="#A78BFA"/>
        <text x="96" y="83" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="8" font-weight="600" fill="white">이</text>
      </g>
    </g>

    <!-- ─ Column 4: Done ─ -->
    <g transform="translate(424, 62)">
      <rect width="128" height="420" rx="10" fill="#F4F5F7"/>
      <rect width="128" height="40" rx="10" fill="#D1FAE5"/>
      <rect y="30" width="128" height="10" fill="#F4F5F7"/>
      <text x="14" y="25" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="13" fill="#2C3E50">Done</text>
      <rect x="90" y="13" width="26" height="16" rx="8" fill="rgba(0,0,0,0.08)"/>
      <text x="103" y="25" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="10" fill="#2C3E50">5</text>

      <!-- Card 1 — done style -->
      <g transform="translate(8, 48)" filter="url(#cardShadow)">
        <rect width="112" height="72" rx="6" fill="white" opacity="0.75"/>
        <rect x="8" y="10" width="36" height="14" rx="3" fill="#FEF3C7"/>
        <text x="26" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#92400E">TASK</text>
        <text x="8" y="42" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#8993A4" text-decoration="line-through">DB 스키마 설계</text>
        <rect x="8" y="52" width="44" height="14" rx="3" fill="#D1FAE5"/>
        <text x="30" y="63" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="600" fill="#065F46">✓ 완료</text>
      </g>

      <!-- Card 2 — done style -->
      <g transform="translate(8, 128)" filter="url(#cardShadow)">
        <rect width="112" height="68" rx="6" fill="white" opacity="0.75"/>
        <rect x="8" y="10" width="36" height="14" rx="3" fill="#FEF3C7"/>
        <text x="26" y="21" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="500" fill="#92400E">TASK</text>
        <text x="8" y="42" font-family="'Noto Sans KR', sans-serif" font-size="11" font-weight="500" fill="#8993A4" text-decoration="line-through">ERD 확정</text>
        <rect x="8" y="50" width="44" height="14" rx="3" fill="#D1FAE5"/>
        <text x="30" y="61" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" font-weight="600" fill="#065F46">✓ 완료</text>
      </g>
    </g>

    <!-- Board bottom fade -->
    <rect y="440" width="580" height="50" rx="0" fill="url(#boardFade)" opacity="0.6"/>
  </g>

  <!-- Floating badge — Goal progress -->
  <g transform="translate(545, 320)" filter="url(#cardShadow)">
    <rect width="150" height="68" rx="10" fill="white"/>
    <text x="14" y="22" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="11" fill="#2C3E50">MVP 출시 진척률</text>
    <rect x="14" y="32" width="122" height="6" rx="3" fill="#F4F5F7"/>
    <rect x="14" y="32" width="85" height="6" rx="3" fill="#629584"/>
    <text x="14" y="56" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#5A6B7F">34 / 48 완료</text>
    <text x="126" y="56" text-anchor="end" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="11" fill="#629584">71%</text>
  </g>

  <!-- Floating badge — overdue warning -->
  <g transform="translate(545, 426)" filter="url(#cardShadow)">
    <rect width="150" height="50" rx="10" fill="white"/>
    <rect x="14" y="13" width="20" height="20" rx="4" fill="#FEE2E2"/>
    <text x="24" y="27" text-anchor="middle" font-size="12" fill="#DC2626">⚠</text>
    <text x="42" y="24" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="11" fill="#2C3E50">오버듀 2건</text>
    <text x="42" y="37" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" fill="#8993A4">즉시 확인 필요</text>
  </g>

  <!-- Bottom strip -->
  <rect y="600" width="1200" height="30" fill="#F0F4F0" opacity="0.6"/>
  <text x="600" y="620" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#8993A4">© 2025 Tika · Plan Simply. Ship Boldly.</text>
</svg>
